<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <link rel="stylesheet" href="style.css">
    </link>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700&display=swap" rel="stylesheet" />

</head>

<body class="checkout-page">

    <header>
        <img class="app-logo" src="https://btholt.github.io/complete-intro-to-web-dev-v3/images/coffee_masters_logo.png"
            alt="coffee_masters_logo">
        <h1 class="app-name">Coffee Masters</h1>
    </header>

    <main class="checkout-form">

        <form class="items-container box">
            <h2>ITEMS</h2>
            <ul class="items">
                <li class="item">
                    <div class="item-quantity">1x</div>
                    <div class="item-name">Cappuccino</div>
                    <div class="item-price">$3.35</div>
                    <ul class="item-attributes-list">
                        <li class="item-attribute">Lite Foam</li>
                    </ul>
                </li>
                <li class="item">
                    <div class="item-quantity">1x</div>
                    <div class="item-name">Cappuccino</div>
                    <div class="item-price">$3.85</div>
                    <ul class="item-attributes-list">
                        <li class="item-attribute">Lite Foam</li>
                        <li class="item-attribute">Double espresso</li>
                    </ul>
                </li>
                <li class="item">
                    <div class="item-quantity">1x</div>
                    <div class="item-name">Croissant</div>
                    <div class="item-price">$2.45</div>
                    <ul class="item-attributes-list">
                        <li class="item-attribute">Butter</li>
                    </ul>

                </li>
            </ul>
        </form>

        <div class="name-container box">
            <h2 class="box-title">NAME</h2>
            <div class="input">
                <label for="name-for-order" class="name-for-order-label">Name for order
                    <input id="name-for-order" class="name-for-order-input" type="text" placeholder="Ford Perfect" />
                </label>
            </div>
        </div>

        <div class="payment-container box">
            <h2 class="box-title">PAYMENT</h2>
            <div class="input">
                <label for="card-number" class="card-number-label">Card number</label>
                <input id="card-number" class="card-number-input" type="number" placeholder="1234 5678 9012 3456" />
            </div>
        </div>
        <div class="">
            <label for="ccv-number" class="ccv-number-label">CCV Number
            </label>
            <input type="number" class="ccv-number-input" placeholder="001" maxlength="3" />

        </div>

        <output class="checkout-container">

            <div class="checkout-container-item">
                <span class="checkout-container-item-text">Subtotal</span>
                <span class="checkout-container-item-quantity">9.65</span>
            </div>

            <div class="checkout-container-item">
                <span class="checkout-container-item-text">Tax</span>
                <span class="checkout-container-item-quantity">0.82</span>
            </div>

            <div class="checkout-container-item">
                <span class="checkout-container-item-text">Total</span>
                <span class="checkout-container-item-quantity">10.45</span>
            </div>

        </output>

    </main>


    <button class="place-order" type="button">Place order</button>


</body>


</html>
